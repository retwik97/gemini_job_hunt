name: Daily Job Search Bot

on:
  schedule:
    # GitHub Actions cron is UTC. 10:00 AM IST = 04:30 AM UTC.
    - cron: "30 4 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write # needed so the workflow can commit updated seen-jobs.json / logs back

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run job search bot
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          LLM_PROVIDER: gemini # change to "claude" here when you're ready to switch
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/index.js

      - name: Commit updated tracking data
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@github.com"
          git add data/seen-jobs.json data/application-log.json
          git diff --staged --quiet || git commit -m "Update job tracking data [skip ci]"
          git push
